<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross-Modal Cartographer</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
</head>
<body>
    <header>
        <h1>Cross-Modal Cartographer</h1>
        <p class="subtitle">Sketch + Text Search for Egyptian Landmarks</p>
    </header>

    <main>
        <!-- Input Panel -->
        <section class="input-panel">
            <!-- Canvas -->
            <div class="canvas-section">
                <h2>Draw Your Sketch</h2>
                <div class="canvas-wrapper">
                    <canvas id="sketch-canvas"></canvas>
                </div>
                <div class="toolbar">
                    <button id="btn-pen" class="tool-btn active" title="Pen">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                    </button>
                    <button id="btn-eraser" class="tool-btn" title="Eraser">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
                    </button>
                    <button id="btn-undo" class="tool-btn" title="Undo">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                    </button>
                    <button id="btn-clear" class="tool-btn" title="Clear">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </button>
                    <div class="tool-separator"></div>
                    <button id="btn-upload" class="tool-btn" title="Upload Image">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </button>
                    <input type="file" id="file-upload" accept="image/*" style="display:none">
                    <div class="tool-separator"></div>
                    <input type="color" id="color-picker" value="#000000" title="Brush Color">
                    <label class="brush-size-label">
                        <input type="range" id="brush-size" min="1" max="20" value="4">
                    </label>
                </div>
            </div>

            <!-- Text Input -->
            <div class="input-group">
                <label for="text-query">Description</label>
                <input type="text" id="text-query" placeholder="Describe what you're looking for..." autocomplete="off">
            </div>

            <!-- Location Section -->
            <div class="input-group">
                <label>Location</label>
                <div class="toggle-row">
                    <label class="toggle-switch">
                        <input type="checkbox" id="detect-location">
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label">Detect my location</span>
                    <span id="detected-city" class="detected-city"></span>
                </div>
                <div class="location-search-wrapper" id="location-search-wrapper">
                    <input type="text" id="location-search" placeholder="Search for a city in Egypt..." autocomplete="off">
                    <ul id="location-suggestions" class="suggestions-list"></ul>
                </div>
            </div>

            <!-- Pipeline Toggles -->
            <div class="input-group toggles-section">
                <label>Pipeline Components</label>
                <div class="toggle-row">
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-faiss" checked>
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label">Vector Database (FAISS)</span>
                </div>
                <div class="toggle-row">
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-kg" checked>
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label">Knowledge Graph</span>
                </div>
            </div>

            <!-- Alpha Slider -->
            <div class="input-group">
                <label for="alpha-slider">
                    Sketch Weight: <span id="alpha-value">60%</span>
                    <span class="alpha-detail"> | Text: <span id="text-weight">40%</span></span>
                </label>
                <input type="range" id="alpha-slider" min="0" max="100" value="60" step="5">
            </div>

            <!-- Search Button -->
            <button id="btn-search" class="search-btn">Search</button>
        </section>

        <!-- Results Panel -->
        <section class="results-panel">
            <div id="stats-bar" class="stats-bar" style="display:none;"></div>
            <div id="results-tabs" class="results-tabs" style="display:none;">
                <button class="tab-btn active" data-tab="accepted">
                    Accepted <span id="tab-count-accepted" class="tab-count">0</span>
                </button>
                <button class="tab-btn" data-tab="rejected">
                    Below Threshold <span id="tab-count-rejected" class="tab-count">0</span>
                </button>
                <button class="tab-btn" data-tab="violations">
                    Schema Violations <span id="tab-count-violations" class="tab-count">0</span>
                </button>
            </div>
            <div id="loading" class="loading" style="display:none;">
                <div class="spinner"></div>
                <span>Searching landmarks...</span>
            </div>
            <div id="results-grid" class="results-grid"></div>
            <div id="empty-state" class="empty-state">
                <div class="empty-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                </div>
                <p>Draw a sketch and hit Search to find Egyptian landmarks</p>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
